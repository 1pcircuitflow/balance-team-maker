<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 로그인 처리 중...</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #FEE500; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .container { text-align: center; padding: 2rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top-color: #3C1E1E; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #3C1E1E; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>로그인 처리 중...</p>
    </div>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            if (error || !code) {
                document.querySelector('p').textContent = '로그인에 실패했습니다. 다시 시도해주세요.';
                return;
            }

            const state = params.get('state') || '';
            const isAndroid = /android/i.test(navigator.userAgent);
            // 네이티브 앱 판별: state 파라미터만 사용 (앱에서 Browser.open() 호출 시 state=source%3Dapp 전달)
            const isNative = state.includes('source=app');

            if (isNative && isAndroid) {
                // 네이티브 앱(Android): Intent URL로 앱 복귀 (Chrome Custom Tab 호환)
                document.querySelector('p').textContent = 'Belo 앱으로 이동 중...';
                var intentUrl = 'intent://kakao-callback?code=' + encodeURIComponent(code)
                    + '#Intent;scheme=balanceteam;package=com.balanceteammaker;end';
                window.location.href = intentUrl;
            } else if (isNative) {
                // 네이티브 앱(iOS 등): 커스텀 스킴으로 앱 복귀
                window.location.href = 'balanceteam://kakao-callback?code=' + encodeURIComponent(code);
                setTimeout(function() {
                    document.querySelector('p').textContent = '앱으로 이동하지 못했습니다. Belo 앱을 열어주세요.';
                }, 3000);
            } else {
                // 웹 (카카오톡 인앱 포함): 메인 페이지로 code 전달
                var pendingRoom = sessionStorage.getItem('kakao_pending_room') || '';
                sessionStorage.removeItem('kakao_pending_room');
                var redirectUrl = pendingRoom
                    ? '/?kakao_code=' + encodeURIComponent(code) + '&room=' + encodeURIComponent(pendingRoom)
                    : '/?kakao_code=' + encodeURIComponent(code);
                window.location.href = redirectUrl;
            }
        })();
    </script>
</body>
</html>
