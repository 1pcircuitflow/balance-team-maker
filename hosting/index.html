<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belo - Apply</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2dtSmLQ4KwPaoqAfyA/DfmEc1VDxu4kykhOQv0b17OH4SO" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617' }
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .tier-btn.active-S { background-color: #f3e8ff; color: #7e22ce; border-color: #e9d5ff; }
        .dark .tier-btn.active-S { background-color: rgba(126, 34, 206, 0.3); color: #d8b4fe; border-color: #9333ea; }
        .tier-btn.active-A { background-color: #fff1f2; color: #be123c; border-color: #ffe4e6; }
        .dark .tier-btn.active-A { background-color: rgba(190, 18, 60, 0.3); color: #fda4af; border-color: #e11d48; }
        .tier-btn.active-B { background-color: #eff6ff; color: #1d4ed8; border-color: #dbeafe; }
        .dark .tier-btn.active-B { background-color: rgba(29, 78, 216, 0.3); color: #93c5fd; border-color: #2563eb; }
        .tier-btn.active-C { background-color: #ecfdf5; color: #047857; border-color: #d1fae5; }
        .dark .tier-btn.active-C { background-color: rgba(4, 120, 87, 0.3); color: #6ee7b7; border-color: #059669; }
        .tier-btn.active-D { background-color: #f8fafc; color: #64748b; border-color: #f1f5f9; }
        .dark .tier-btn.active-D { background-color: rgba(30, 41, 59, 0.5); color: #94a3b8; border-color: #475569; }

        .menu-popup { z-index: 1000; }
        .node { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        .delay-75 { animation-delay: 75ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-zoom-in { animation: zoomIn 0.4s ease-out forwards; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col items-center py-4 px-4 sm:px-6">

    <!-- 인앱 브라우저 차단 안내 레이어 -->
    <div id="inAppOverlay" class="hidden fixed inset-0 z-[2000] bg-white dark:bg-slate-950 flex flex-col items-center justify-center p-8 text-center space-y-6">
        <!-- 기본 안내 (네이버/인스타 등 일반 인앱) -->
        <div id="inAppDefault">
            <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center shadow-inner animate-bounce mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <div class="space-y-2">
                <h2 id="inAppTitle" class="text-xl font-black text-slate-800 dark:text-slate-100"></h2>
                <p id="inAppDesc" class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium"></p>
            </div>
        </div>
        <!-- 카카오톡+Android 전용 안내 -->
        <div id="inAppKakao" class="hidden">
            <img src="/assets/logo.png" alt="Belo" class="w-20 h-20 mx-auto mb-4">
            <div class="space-y-2">
                <h2 id="kakaoOverlayTitle" class="text-xl font-black text-slate-800 dark:text-slate-100"></h2>
                <p id="kakaoOverlayDesc" class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium"></p>
            </div>
            <div class="w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin mx-auto mt-6"></div>
            <button type="button" id="kakaoWebFallbackBtn"
                class="mt-8 text-[13px] font-bold text-slate-400 dark:text-slate-500 underline underline-offset-4 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
            </button>
        </div>
        <div id="iosGuide" class="hidden p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 space-y-3">
            <p id="iosGuideTitle" class="text-xs text-slate-500 font-bold italic"></p>
            <div class="flex items-center justify-center gap-3 text-slate-700 dark:text-slate-300">
                <span class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-800 text-[10px] flex items-center justify-center font-black border border-slate-200 dark:border-slate-700">1</span>
                <p id="iosStep1" class="text-[11px] font-black text-left leading-snug"></p>
            </div>
            <div class="flex items-center justify-center gap-3 text-slate-700 dark:text-slate-300">
                <span class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-800 text-[10px] flex items-center justify-center font-black border border-slate-200 dark:border-slate-700">2</span>
                <p id="iosStep2" class="text-[11px] font-black text-left leading-snug"></p>
            </div>
        </div>
    </div>

    <!-- 상단 바: 다크모드 + 언어 선택 -->
    <div class="fixed top-4 right-4 flex items-center gap-2 z-50">
        <div class="relative">
            <button id="langToggle" class="p-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm transition-all hover:scale-110 active:scale-95">
                <span id="langIcon" class="text-[13px] font-black text-slate-500 dark:text-slate-400 leading-none block w-6 h-6 flex items-center justify-center">KO</span>
            </button>
            <div id="langMenu" class="hidden absolute right-0 top-12 w-36 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl overflow-hidden z-[100]">
                <button data-lang="ko" class="lang-opt w-full px-4 py-2.5 text-left text-[13px] font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">한국어</button>
                <button data-lang="en" class="lang-opt w-full px-4 py-2.5 text-left text-[13px] font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">English</button>
                <button data-lang="ja" class="lang-opt w-full px-4 py-2.5 text-left text-[13px] font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">日本語</button>
                <button data-lang="es" class="lang-opt w-full px-4 py-2.5 text-left text-[13px] font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Español</button>
                <button data-lang="pt" class="lang-opt w-full px-4 py-2.5 text-left text-[13px] font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Português</button>
            </div>
        </div>
        <button id="themeToggle" class="p-2.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm transition-all hover:scale-110 active:scale-95">
            <span id="themeIcon" class="text-xl leading-none block">🌙</span>
        </button>
    </div>

    <div class="max-w-md w-full space-y-3">
        <!-- 헤더 -->
        <header class="flex items-center justify-center gap-3 animate-fade-in-up">
            <img src="/assets/logo.png" alt="Belo Logo" class="w-16 h-16">
            <h1 class="text-4xl font-black tracking-tighter text-slate-900 dark:text-white uppercase italic">Belo</h1>
        </header>

        <!-- 로딩 -->
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
            <p id="loadingText" class="text-slate-400 dark:text-slate-500 font-bold text-[13px]"></p>
        </div>

        <!-- 방 정보 카드 -->
        <div id="roomInfo" class="hidden p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm space-y-3 animate-fade-in-up">
            <div class="flex items-center justify-between">
                <span id="roomSport" class="px-3 py-1 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-[11px] font-black uppercase tracking-wider">---</span>
                <span id="roomStatus" class="px-2.5 py-0.5 rounded-full text-[10px] font-black"></span>
            </div>
            <div id="roomTitle" class="text-[16px] font-black text-slate-800 dark:text-slate-100 hidden"></div>
            <div class="space-y-1.5">
                <div class="flex items-center gap-2 text-[12px] text-slate-500 dark:text-slate-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span id="roomDateTime" class="font-bold">---</span>
                </div>
                <div id="roomVenueRow" class="hidden flex items-center gap-2 text-[12px] text-slate-500 dark:text-slate-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span id="roomVenue" class="font-bold">---</span>
                </div>
                <div class="flex items-center gap-2 text-[12px] text-slate-500 dark:text-slate-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span id="roomCapacity" class="font-bold">---</span>
                </div>
            </div>
        </div>

        <!-- 앱 다운로드 배너 -->
        <a id="appBanner" href="https://play.google.com/store/apps/details?id=com.balanceteammaker" target="_blank"
            class="hidden group relative flex items-center gap-3 p-3.5 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 overflow-hidden shadow-lg shadow-blue-900/20 transition-all hover:scale-[1.01] active:scale-[0.98] animate-fade-in-up delay-75 no-underline">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_80%_50%,rgba(255,255,255,0.1),transparent)] pointer-events-none"></div>
            <img src="/assets/logo.png" alt="Belo" class="relative w-10 h-10 rounded-xl shadow-md flex-shrink-0 bg-white p-0.5">
            <div class="relative flex-1 min-w-0">
                <p id="appBannerTitle" class="text-[12px] font-black text-white leading-tight"></p>
                <p id="appBannerDesc" class="text-[10px] font-bold text-blue-200 leading-tight mt-0.5"></p>
            </div>
            <div class="relative flex-shrink-0 px-3 py-1.5 rounded-xl bg-white/20 backdrop-blur-sm border border-white/30 text-white text-[10px] font-black group-hover:bg-white/30 transition-colors">
                <span id="appBannerBtn"></span>
            </div>
        </a>

        <!-- 신청 폼 -->
        <form id="applyForm" class="hidden space-y-3 animate-fade-in-up delay-150">
            <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm space-y-3">
                <!-- 로그인 섹션 -->
                <div id="loginSection" class="hidden space-y-4">
                    <div id="authError" class="hidden mx-4 p-3 rounded-xl bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-800/50 text-[11px] font-bold text-rose-600 dark:text-rose-400 text-center"></div>
                    <div id="loginPrompt" class="text-center py-4 space-y-3">
                        <div class="w-12 h-12 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto shadow-inner">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <p id="loginRequiredTitle" class="text-[14px] font-black text-slate-800 dark:text-slate-100 uppercase tracking-tighter"></p>
                        <p id="loginRequiredDesc" class="text-[12px] font-bold text-slate-500 dark:text-slate-400 leading-relaxed px-4"></p>
                    </div>

                    <button type="button" id="loginBtn"
                        class="w-full flex items-center justify-center gap-2 p-3.5 rounded-2xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all group shadow-sm">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        <span id="googleLoginText" class="text-[14px] font-black text-slate-700 dark:text-slate-300"></span>
                    </button>

                    <button type="button" id="kakaoLoginBtn"
                        class="w-full flex items-center justify-center gap-2 p-3.5 rounded-2xl transition-all group shadow-sm"
                        style="background-color: #FEE500;">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#000000" d="M12 3C6.477 3 2 6.463 2 10.691c0 2.72 1.8 5.108 4.513 6.467-.197.736-.714 2.666-.818 3.079-.128.506.186.499.39.363.16-.107 2.554-1.736 3.588-2.442.742.104 1.507.16 2.327.16 5.523 0 10-3.463 10-7.627S17.523 3 12 3" />
                        </svg>
                        <span id="kakaoLoginText" class="text-[14px] font-black text-black"></span>
                    </button>

                    <div id="userInfo" class="hidden flex items-center justify-between p-3 rounded-2xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-800/50">
                        <div class="flex items-center gap-3 text-left">
                            <img id="userPhoto" src="" class="w-9 h-9 rounded-full border-2 border-white dark:border-slate-700 shadow-sm" alt="P">
                            <div class="flex flex-col">
                                <span id="userName" class="text-[13px] font-black text-slate-800 dark:text-slate-100 leading-tight">User</span>
                                <span class="text-[10px] font-bold text-blue-500 dark:text-blue-400 uppercase tracking-tight">Verified</span>
                            </div>
                        </div>
                        <button type="button" id="logoutBtn"
                            class="text-[10px] font-black text-slate-400 hover:text-rose-500 transition-colors uppercase px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800">Logout</button>
                    </div>
                </div>

                <!-- 폼 내용 -->
                <div id="formContent" class="hidden space-y-4 pt-2">
                    <div class="space-y-1 text-left">
                        <label id="nameLabel" class="text-[12px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1"></label>
                        <input type="text" id="name" required readonly maxlength="10"
                            class="w-full p-2.5 rounded-xl bg-slate-100 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 text-slate-900 dark:text-white placeholder:text-slate-300 dark:placeholder:text-slate-700 font-bold focus:ring-0 transition-all outline-none text-[13px] cursor-not-allowed">
                    </div>

                    <div class="space-y-2 text-left">
                        <div class="flex items-center gap-1.5">
                            <button type="button" id="tierGuideBtn"
                                class="w-5 h-5 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-[10px] font-black text-slate-400 dark:text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">?</button>
                            <label id="tierLabel" class="text-[12px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest"></label>
                        </div>
                        <div id="tierGroup" class="grid grid-cols-5 gap-2">
                            <button type="button" data-tier="S" class="tier-btn p-2 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-400 dark:text-slate-600 font-black text-sm border border-slate-100 dark:border-slate-800 transition-all">S</button>
                            <button type="button" data-tier="A" class="tier-btn p-2 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-400 dark:text-slate-600 font-black text-sm border border-slate-100 dark:border-slate-800 transition-all">A</button>
                            <button type="button" data-tier="B" class="tier-btn p-2 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-400 dark:text-slate-600 font-black text-sm border border-slate-100 dark:border-slate-800 transition-all">B</button>
                            <button type="button" data-tier="C" class="tier-btn p-2 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-400 dark:text-slate-600 font-black text-sm border border-slate-100 dark:border-slate-800 transition-all">C</button>
                            <button type="button" data-tier="D" class="tier-btn p-2 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-400 dark:text-slate-600 font-black text-sm border border-slate-100 dark:border-slate-800 transition-all">D</button>
                        </div>
                    </div>

                    <div id="posSection" class="space-y-2 text-left">
                        <div class="flex items-center gap-1.5">
                            <button type="button" id="posGuideBtn"
                                class="w-5 h-5 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-[10px] font-black text-slate-400 dark:text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">?</button>
                            <label id="posLabel" class="text-[12px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest"></label>
                        </div>
                        <div class="relative aspect-[1.1/1] w-[85%] mx-auto bg-slate-50 dark:bg-slate-950/50 rounded-2xl border border-slate-100 dark:border-slate-900" id="pitch">
                            <div id="pitchLines" class="absolute inset-0 opacity-10 pointer-events-none"></div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full p-4 rounded-2xl bg-blue-500 hover:bg-blue-600 text-white font-bold text-[14px] shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all">
                </button>
            </div>
        </form>

        <!-- 이미 신청한 경우 표시 -->
        <div id="alreadyApplied" class="hidden p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm text-center space-y-4 animate-zoom-in">
            <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div class="space-y-1">
                <h3 id="alreadyAppliedTitle" class="text-[16px] font-black text-slate-800 dark:text-slate-100"></h3>
                <p id="alreadyAppliedStatus" class="text-[13px] font-bold text-slate-500 dark:text-slate-400"></p>
            </div>
            <button type="button" id="cancelApplyBtn"
                class="w-full py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 text-rose-500 font-bold text-[13px] transition-all active:scale-95 hover:bg-rose-50 dark:hover:bg-rose-900/20">
            </button>
        </div>

        <!-- 티어 가이드 모달 -->
        <div id="tierModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
            <div id="tierModalOverlay" class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm"></div>

        function detectLang() {
            const urlParams = new URLSearchParams(window.location.search);

            const stored = localStorage.getItem('btm_lang');
            if (stored && T[stored]) return stored;
            const nav = (navigator.language || '').toLowerCase();
            if (nav.startsWith('ko')) return 'ko';
            if (nav.startsWith('ja')) return 'ja';
            if (nav.startsWith('es')) return 'es';
            if (nav.startsWith('pt')) return 'pt';
            if (nav.startsWith('en')) return 'en';
            return 'ko';
        }

        // ===================== 방 정보 렌더링 =====================
        function normalizeSport(raw) {

            if (s === 'FUTSAL') return 'Futsal';
            if (s === 'BASKETBALL') return 'Basketball';

        function getSportLabel(sport) {

            document.getElementById('roomSport').textContent = getSportLabel(sport);

            // 제목
            const titleEl = document.getElementById('roomTitle');

        function showMenu(posId, anchor) {
            document.querySelectorAll('.menu-popup').forEach(m => m.remove());
            const menu = document.createElement('div');
            const container = document.getElementById('pitch');
            menu.className = 'menu-popup absolute p-1.5 bg-white dark:bg-slate-900 rounded-full shadow-2xl border border-slate-100 dark:border-slate-800 flex items-center gap-1.5 min-w-max z-50';

            // 노드 위에 메뉴 배치 (getBoundingClientRect로 정확한 위치 계산)
            const containerRect = container.getBoundingClientRect();
            const anchorRect = anchor.getBoundingClientRect();
            const centerX = anchorRect.left + anchorRect.width / 2 - containerRect.left;
            const topY = anchorRect.top - containerRect.top - 8;
            menu.style.left = centerX + 'px';
            menu.style.top = topY + 'px';
            menu.style.transform = 'translate(-50%, -100%)';
            menu.onpointerdown = (e) => e.stopPropagation();

            [{ l: 1, v: '100', c: 'bg-emerald-500' }, { l: 2, v: '75', c: 'bg-yellow-400' }, { l: 3, v: '50', c: 'bg-orange-400' }, { l: 'X', v: 'X', c: 'bg-rose-500' }].forEach(opt => {

                b.className = `w-10 h-10 rounded-full ${opt.c} text-white text-xs font-black transition-all active:scale-95`;
                b.innerHTML = `<span>${opt.v}</span>`;
                b.onpointerdown = (e) => { e.preventDefault(); e.stopPropagation(); selectPos(posId, opt); menu.remove(); };
                menu.appendChild(b);

            container.appendChild(menu);

        function selectPos(posId, opt) {
            selections[posId] = opt.l;
            if (opt.l === 1 || opt.l === 2 || opt.l === 3) {
                const config = POS_CONFIG[currentSport] || POS_CONFIG['Soccer'];
                config.forEach(pos => {
                    if (pos.id !== posId && ![1, 2, 3].includes(selections[pos.id])) {
                        selections[pos.id] = 'X'; updateNodeUI(pos.id, { l: 'X', v: 'X', c: 'bg-rose-500' });
                    }
                });
            }
            updateNodeUI(posId, opt);
        }

        function updateNodeUI(p, o) {
            const n = document.getElementById('node-' + p);
            const l = document.getElementById('label-' + p);
            if (!n || !l) return;
            n.className = `node absolute -translate-x-1/2 -translate-y-1/2 w-11 h-11 rounded-full ${o.c} flex flex-col items-center justify-center shadow-lg border-0 scale-110 z-10`;
            n.querySelector('span').className = 'text-[12px] font-black text-white/80 leading-none';
            l.className = 'text-[11px] font-black text-white leading-none mt-0.5';
            l.textContent = o.v;
        }

        // ===================== 마감 로직 =====================
        function checkExpiry(data) {
            if (!data.matchDate || !data.matchTime) return null; // 날짜 없으면 체크 안함

            const now = new Date();
            // 종료 시간 계산: matchEndDate/matchEndTime 우선, 없으면 matchDate/matchTime 사용
            const endDate = data.matchEndDate || data.matchDate;
            const endTime = data.matchEndTime || data.matchTime;
            const matchEnd = new Date(`${endDate}T${endTime}`);

            // 종료 시간 + 3시간 후 만료 (앱과 동일)
            const expiryTime = new Date(matchEnd.getTime() + 3 * 60 * 60000);
            if (now > expiryTime) return 'expired';

            // 경기 시작 시간
            const matchStart = new Date(`${data.matchDate}T${data.matchTime}`);
            if (now >= matchStart) return 'started';

            return null;
        }

        // ===================== 중복 신청 체크 =====================
        function findExistingApplication(applicants, userId) {
            if (!userId || !applicants) return null;
            return applicants.find(a => a.userId === userId);
        }

        function showAlreadyApplied(existing) {
            document.getElementById('applyForm').classList.add('hidden');
            const el = document.getElementById('alreadyApplied');
            el.classList.remove('hidden');

            const statusEl = document.getElementById('alreadyAppliedStatus');
            const cancelBtn = document.getElementById('cancelApplyBtn');
            cancelBtn.textContent = t('cancelApply');

            if (existing.isApproved || existing.status === 'APPROVED') {
                statusEl.textContent = t('alreadyAppliedApproved');
                statusEl.className = 'text-[13px] font-bold text-emerald-500';
                // 승인된 경우 취소 버튼 숨김
                cancelBtn.classList.add('hidden');
            } else {
                statusEl.textContent = t('alreadyAppliedPending');
                statusEl.className = 'text-[13px] font-bold text-slate-500 dark:text-slate-400';
                cancelBtn.classList.remove('hidden');
            }

            // 취소 버튼 이벤트
            cancelBtn.onclick = async () => {
                if (!confirm(t('cancelConfirm'))) return;

                const urlParams = new URLSearchParams(window.location.search);
                const rid = urlParams.get('room');
                if (!rid || !currentRoomData) return;

                cancelBtn.disabled = true;
                cancelBtn.textContent = t('cancelling');

                try {
                    // applicants 배열에서 본인 제거
                    const updatedApplicants = (currentRoomData.applicants || []).filter(
                        a => a.userId !== currentUserId
                    );
                    await updateDoc(doc(db, "rooms", rid), {
                        applicants: updatedApplicants
                    });

                    // UI 복원: 신청 화면으로 돌아가기
                    el.classList.add('hidden');
                    document.getElementById('applyForm').classList.remove('hidden');
                    const submitBtn = document.getElementById('submitBtn');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = t('apply');
                    }
                } catch (e) {
                    console.error('Cancel error:', e);
                    cancelBtn.disabled = false;
                    cancelBtn.textContent = t('cancelApply');
                }
            };
        }

        // ===================== 인앱 브라우저 처리 =====================
        const isAndroid = /android/i.test(navigator.userAgent);
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        function isInAppBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.includes('kakao') || ua.includes('naver') || ua.includes('instagram') || ua.includes('line') || ua.includes('fbav');
        }

        function isKakaoInApp() {
            return /kakao/i.test(navigator.userAgent.toLowerCase());
        }

        // 카카오톡 인앱은 카카오 로그인 가능 → 오버레이 없이 페이지 정상 표시
        // 네이버/인스타 등 다른 인앱은 Chrome/Safari로 이동
        function checkAndRedirectNonKakaoInApp() {
            if (!isInAppBrowser()) return false;
            if (isKakaoInApp()) return false; // 카카오톡 인앱은 통과

            const overlay = document.getElementById('inAppOverlay');
            const iosGuide = document.getElementById('iosGuide');
            if (overlay) overlay.classList.remove('hidden');

            const currentUrl = window.location.href;
            if (isAndroid) {
                setTimeout(() => {
                    const intentUrl = `intent://${currentUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
                    window.location.href = intentUrl;
                }, 1500);
            } else if (isIOS) {
                if (iosGuide) iosGuide.classList.remove('hidden');
            }
            return true;
        }

        // 구글 로그인 버튼 전용: 인앱에서 Chrome으로 이동
        function redirectToChrome() {
            const overlay = document.getElementById('inAppOverlay');
            if (overlay) overlay.classList.remove('hidden');

            const currentUrl = window.location.href;
            if (isAndroid) {
                setTimeout(() => {
                    const intentUrl = `intent://${currentUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
                    window.location.href = intentUrl;
                }, 1500);
            } else if (isIOS) {
                const iosGuide = document.getElementById('iosGuide');
                if (iosGuide) iosGuide.classList.remove('hidden');
            }
        }

        checkAndRedirectNonKakaoInApp();

        // ===================== 인증 시스템 =====================
        async function startAuth() {
            try {
                await setPersistence(auth, browserLocalPersistence);

                onAuthStateChanged(auth, async (user) => {
                    const formContent = document.getElementById('formContent');
                    const loginPrompt = document.getElementById('loginPrompt');
                    const loginSection = document.getElementById('loginSection');
                    const submitBtn = document.getElementById('submitBtn');
                    const authError = document.getElementById('authError');

                    if (loginSection) loginSection.classList.remove('hidden');

                    if (user) {
                        currentUserId = user.uid;
                        if (loginBtn) loginBtn.classList.add('hidden');
                        if (kakaoLoginBtn) kakaoLoginBtn.classList.add('hidden');
                        if (loginPrompt) loginPrompt.classList.add('hidden');
                        if (userInfo) userInfo.classList.remove('hidden');
                        if (formContent) formContent.classList.remove('hidden');
                        if (submitBtn) submitBtn.classList.remove('hidden');
                        if (authError) authError.classList.add('hidden');

                        document.getElementById('userPhoto').src = user.photoURL || '';
                        document.getElementById('userName').textContent = user.displayName;
                        nameInput.value = user.displayName;
                        nameInput.readOnly = true;

                        // 중복 신청 체크
                        if (currentRoomData) {
                            const existing = findExistingApplication(currentRoomData.applicants, currentUserId);
                            if (existing) { showAlreadyApplied(existing); return; }
                        }

                        try {
                            const userDoc = await getDoc(doc(db, "users", user.uid));
                            if (userDoc.exists()) {
                                const d = userDoc.data();
                                if (d.tier) selectTier(d.tier);
                            }
                        } catch (e) { }
                    } else {
                        currentUserId = null;
                        // 카카오 로그인 상태 확인
                        const kakaoUser = JSON.parse(localStorage.getItem('kakao_user') || 'null');
                        if (kakaoUser) {
                            currentUserId = kakaoUser.id || kakaoUser.uid;
                            handleKakaoUserUI(kakaoUser);
                            return;
                        }

                        if (loginBtn) loginBtn.classList.remove('hidden');
                        if (kakaoLoginBtn) kakaoLoginBtn.classList.remove('hidden');
                        if (loginPrompt) loginPrompt.classList.remove('hidden');
                        if (userInfo) userInfo.classList.add('hidden');
                        if (formContent) formContent.classList.add('hidden');
                        if (submitBtn) submitBtn.classList.add('hidden');
                        nameInput.value = '';
                        nameInput.readOnly = true;
                    }
                });

                const result = await getRedirectResult(auth);
            } catch (error) {
                console.error("Auth System Error:", error);
                const authError = document.getElementById('authError');
                if (authError) {
                    let msg = "Error: " + error.code;
                    if (error.code === 'auth/unauthorized-domain') {
                        msg = "Domain authorization needed. Please add belo-apply.web.app to Firebase Auth settings.";
                    }
                    authError.textContent = msg;
                    authError.classList.remove('hidden');
                    if (loginSection) loginSection.classList.remove('hidden');
                }
            }
        }

        function handleKakaoUserUI(kakaoUser) {
            if (loginBtn) loginBtn.classList.add('hidden');
            if (kakaoLoginBtn) kakaoLoginBtn.classList.add('hidden');
            const loginPrompt = document.getElementById('loginPrompt');
            const formContent = document.getElementById('formContent');
            const submitBtn = document.getElementById('submitBtn');
            if (loginPrompt) loginPrompt.classList.add('hidden');
            if (userInfo) userInfo.classList.remove('hidden');
            if (formContent) formContent.classList.remove('hidden');
            if (submitBtn) submitBtn.classList.remove('hidden');

            document.getElementById('userPhoto').src = kakaoUser.imageUrl || '';
            document.getElementById('userName').textContent = kakaoUser.givenName;
            nameInput.value = kakaoUser.givenName;
            nameInput.readOnly = true;

            // 중복 신청 체크
            if (currentRoomData) {
                const existing = findExistingApplication(currentRoomData.applicants, currentUserId);
                if (existing) showAlreadyApplied(existing);
            }
        }

        startAuth();

        loginBtn.onclick = async () => {
            // 인앱(카카오톡 포함)에서 구글 로그인 → Chrome으로 이동 필요
            if (isInAppBrowser()) {
                redirectToChrome();
                return;
            }
            try {
                const provider = new GoogleAuthProvider();
                await signInWithRedirect(auth, provider);
            } catch (e) {
                console.error("Login Error:", e);
            }
        };

        kakaoLoginBtn.onclick = () => {
            // SDK(Kakao.Auth.authorize) 대신 직접 OAuth URL로 리다이렉트 (앱과 동일 방식)
            // 카카오톡 인앱에서 SDK 호출이 안 되는 문제 해결
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room');
            if (roomId) sessionStorage.setItem('kakao_pending_room', roomId);

            const redirectUri = encodeURIComponent(window.location.origin + '/kakao-callback');
            window.location.href = `https://kauth.kakao.com/oauth/authorize?client_id=878d084cb95d54a3657541f72b9bbe97&redirect_uri=${redirectUri}&response_type=code`;
        };

        // 카카오 콜백 처리
        async function handleKakaoCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const kakaoCode = urlParams.get('kakao_code');
            if (!kakaoCode) return false;

            try {
                const res = await fetch(KAKAO_AUTH_FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: kakaoCode, redirectUri: window.location.origin + '/kakao-callback' }),
                });
                const userData = await res.json();
                if (!res.ok) throw new Error(userData.error || 'Kakao auth failed');

                localStorage.setItem('kakao_user', JSON.stringify(userData));
                currentUserId = userData.id || userData.uid;
                handleKakaoUserUI(userData);

                // URL 정리
                const pendingRoom = sessionStorage.getItem('kakao_pending_room') || urlParams.get('room');
                sessionStorage.removeItem('kakao_pending_room');
                const cleanUrl = pendingRoom
                    ? window.location.origin + window.location.pathname + '?room=' + pendingRoom
                    : window.location.origin + window.location.pathname;
                window.history.replaceState({}, '', cleanUrl);
                return true;
            } catch (e) {
                console.error("Kakao callback error:", e);
                return false;
            }
        }
        handleKakaoCallback();

        logoutBtn.onclick = () => {
            localStorage.removeItem('kakao_user');
            currentUserId = null;
            signOut(auth);
        };

        // ===================== 초기화 (실시간 구독) =====================
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room');

            if (!roomId) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-center p-8 space-y-4">
                        <div class="text-4xl text-rose-500 font-black">!</div>
                        <p class="text-slate-500 font-bold">${t('invalidLinkDesc').replace(/\n/g, '<br>')}</p>
                    </div>
                `;
                return;
            }

            try {
                const docRef = doc(db, "rooms", roomId);

                // 실시간 구독
                unsubscribeRoom = onSnapshot(docRef, (docSnap) => {
                    if (!docSnap.exists()) {
                        document.getElementById('loading').innerHTML = `
                            <div class="text-center p-8 space-y-4">
                                <div class="text-4xl text-rose-500 font-black">!</div>
                                <p class="text-slate-500 font-bold">${t('roomNotFound')}</p>
                            </div>
                        `;
                        return;
                    }

                    const data = docSnap.data();
                    currentRoomData = data;
                    const rawSport = data.sport || 'Soccer';
                    currentSport = normalizeSport(rawSport);

                    // 마감 체크
                    const expiryStatus = checkExpiry(data);
                    if (expiryStatus === 'expired') {
                        document.body.innerHTML = `
                            <div class="min-h-screen flex flex-col items-center justify-center p-8 text-center space-y-4 bg-slate-50 dark:bg-slate-950">
                                <div class="text-5xl mb-2">🚫</div>
                                <h1 class="text-[18px] font-black text-slate-800 dark:text-slate-200">${t('invalidLink')}</h1>
                                <p class="text-[13px] text-slate-500 font-medium">${t('expired')}</p>
                            </div>
                        `;
                        return;
                    }

                    if (expiryStatus === 'started') {
                        document.getElementById('loading').innerHTML = `
                            <div class="text-center p-8 space-y-4">
                                <div class="text-4xl text-amber-500 font-black">⏳</div>
                                <p class="text-slate-500 font-bold">${t('matchStarted')}</p>
                                <p class="text-xs text-slate-400">(${data.matchDate} ${data.matchTime})</p>
                            </div>
                        `;
                        return;
                    }

                    // 렌더링
                    renderRoomInfo(data);
                    renderParticipants(data.applicants || []);

                    // 방 상태 체크 (CLOSED)
                    const submitBtn = document.getElementById('submitBtn');
                    if (data.status === 'CLOSED') {
                        if (submitBtn) {
                            submitBtn.disabled = true;
                            submitBtn.textContent = t('roomClosed');
                            submitBtn.className = 'w-full p-4 rounded-2xl bg-slate-300 dark:bg-slate-700 text-white font-bold text-[14px] cursor-not-allowed';
                        }
                    }

                    // 정원 체크
                    if (data.maxApplicants > 0) {
                        const approved = (data.applicants || []).filter(a =>
                            a.isApproved === true || a.status === 'APPROVED'
                        );
                        if (approved.length >= data.maxApplicants && submitBtn && data.status !== 'CLOSED') {
                            submitBtn.disabled = true;
                            submitBtn.textContent = t('roomFull');
                            submitBtn.className = 'w-full p-4 rounded-2xl bg-slate-300 dark:bg-slate-700 text-white font-bold text-[14px] cursor-not-allowed';
                        }
                    }

                    // 포지션 섹션
                    if (currentSport === 'General') {
                        document.getElementById('posSection').classList.add('hidden');
                    } else {
                        document.getElementById('posSection').classList.remove('hidden');
                        renderPitch();
                    }

                    // UI 표시
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('roomInfo').classList.remove('hidden');
                    document.getElementById('appBanner').classList.remove('hidden');
                    document.getElementById('participantsInfo').classList.remove('hidden');

                    // 중복 신청 체크 (로그인 상태인 경우) → 신청 폼 or 이미 신청 분기
                    const alreadyExists = currentUserId ? findExistingApplication(data.applicants, currentUserId) : null;
                    if (alreadyExists) {
                        document.getElementById('applyForm').classList.add('hidden');
                        showAlreadyApplied(alreadyExists);
                    } else {
                        document.getElementById('alreadyApplied').classList.add('hidden');
                        document.getElementById('applyForm').classList.remove('hidden');
                    }
                });
            } catch (err) {
                console.error("Init Error:", err);
            }
        }

        init();

        // ===================== 폼 제출 =====================
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const n = nameInput.value.trim();
            if (!n) return;

            const urlParams = new URLSearchParams(window.location.search);
            const rid = urlParams.get('room');
            if (!rid) return;

            const kakaoUser = JSON.parse(localStorage.getItem('kakao_user') || 'null');
            if (!auth.currentUser && !kakaoUser) {
                return;
            }

            const userId = auth.currentUser?.uid || kakaoUser?.id || kakaoUser?.uid;

            // 중복 신청 체크
            if (currentRoomData) {
                const existing = findExistingApplication(currentRoomData.applicants, userId);
                if (existing) {
                    showAlreadyApplied(existing);
                    return;
                }
            }

            localStorage.setItem('btm_user_tier', selectedTier);

            // Firestore에 사용자 정보 저장
            if (userId) {
                try { await setDoc(doc(db, "users", userId), { nickname: n, tier: selectedTier }, { merge: true }); } catch (e) { }
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = t('applying');

            const p = [], s = [], tr = [], f = [];
            Object.entries(selections).forEach(([pos, level]) => {
                if (level === 1) p.push(pos);
                else if (level === 2) s.push(pos);
                else if (level === 3) tr.push(pos);
                else if (level === 'X') f.push(pos);
            });

            try {
                await updateDoc(doc(db, "rooms", rid), {
                    applicants: arrayUnion({
                        id: Math.random().toString(36).substr(2, 9),
                        name: n,
                        tier: selectedTier,
                        position: p[0] || 'NONE',
                        primaryPositions: p,
                        secondaryPositions: s,
                        tertiaryPositions: tr,
                        forbiddenPositions: f,
                        isApproved: false,
                        status: 'PENDING',
                        userId: userId || '',
                        timestamp: new Date().toISOString(),
                        source: 'web'
                    })
                });

                document.getElementById('applyForm').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                submitBtn.disabled = false;
                submitBtn.textContent = t('apply');
                console.error('Submit error:', e);
            }
        };

        // ===================== 성공 화면 닫기 =====================
        document.getElementById('closeSuccessBtn').onclick = () => {
            window.close();
            setTimeout(() => {
                document.getElementById('success').classList.add('hidden');
                document.getElementById('roomInfo').classList.remove('hidden');
                document.getElementById('participantsInfo').classList.remove('hidden');
            }, 300);
        };
    </script>
</body>

</html>
